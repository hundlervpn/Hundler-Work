services:
  db:
    image: postgres:16-alpine
    container_name: hundler-work-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=hundler
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=hundlerwork
    volumes:
      - db_data:/var/lib/postgresql/data
      # Applied only on first initialization of an empty data volume.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hundler -d hundlerwork"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hundler-work-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://hundler:${POSTGRES_PASSWORD}@db:5432/hundlerwork
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    build:
      context: .
      dockerfile: caddy.Dockerfile
    container_name: hundler-work-caddy
    restart: unless-stopped
    depends_on:
      - app
    # Server is dedicated to Hundler Work now, so we take the standard web ports.
    # 80 handles the HTTP->HTTPS redirect; 443 serves the app.
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  db_data: